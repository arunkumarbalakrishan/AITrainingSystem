name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'AITrainingSystem-Frontend/ai-training-system-ui/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'AITrainingSystem-Frontend/ai-training-system-ui/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./AITrainingSystem-Frontend/ai-training-system-ui

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build --configuration=production

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: ./AITrainingSystem-Frontend/ai-training-system-ui/dist/ai-training-system-ui/browser
